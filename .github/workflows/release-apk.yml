name: Build Release APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          CHIRP_RELEASE_KEYSTORE_BASE64: ${{ secrets.CHIRP_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$CHIRP_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$CHIRP_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/chirp-release.p12"
          chmod 600 "$RUNNER_TEMP/chirp-release.p12"

      - name: Build signed release APK
        env:
          CHIRP_RELEASE_STORE_FILE: ${{ runner.temp }}/chirp-release.p12
          CHIRP_RELEASE_STORE_PASSWORD: ${{ secrets.CHIRP_RELEASE_STORE_PASSWORD }}
          CHIRP_RELEASE_KEY_ALIAS: chirp
          CHIRP_RELEASE_KEY_PASSWORD: ${{ secrets.CHIRP_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Verify and package APK
        run: |
          version_name=$(awk -F'"' '/versionName =/ { print $2; exit }' app/build.gradle.kts)
          source_apk="app/build/outputs/apk/release/app-release.apk"
          release_apk="release/chirp-${version_name}.apk"
          apksigner=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)
          test -f "$source_apk"
          test -x "$apksigner"
          mkdir -p release
          cp "$source_apk" "$release_apk"
          "$apksigner" verify --verbose --print-certs "$release_apk"
          (
            cd release
            sha256sum "chirp-${version_name}.apk" > "chirp-${version_name}.apk.sha256"
          )

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-release-apk
          path: |
            release/chirp-*.apk
            release/chirp-*.apk.sha256
          if-no-files-found: error
          retention-days: 14
