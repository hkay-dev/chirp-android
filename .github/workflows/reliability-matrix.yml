name: Reliability Matrix

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  reliability:
    name: Reliability Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run reliability matrix
        run: |
          chmod +x scripts/run-reliability-matrix.sh
          ./scripts/run-reliability-matrix.sh
